<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Éditeur — Atelier Kairos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root{--terra:#C97A61;--terra2:#b06650;--cacao:#6B4F43;--coq:#F8F5F1;--sable:#E7D7C3;--texte:#4A3A31;--ok:#5a7d4f;--err:#b3403a}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:'Lato',sans-serif;background:#ece3da;color:var(--texte);display:flex;flex-direction:column;height:100vh;overflow:hidden}

  /* Barre du haut */
  .toolbar{background:var(--cacao);color:#fff;display:flex;align-items:center;gap:10px;padding:9px 14px;flex-shrink:0}
  .toolbar .logo{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:600;white-space:nowrap;margin-right:4px}
  .toolbar select{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:7px 10px;font:inherit;font-size:.9rem}
  .toolbar select option{color:#000}
  .spacer{flex:1}
  .seg{display:flex;background:rgba(255,255,255,.14);border-radius:8px;overflow:hidden}
  .seg button{background:none;border:none;color:#fff;padding:7px 11px;cursor:pointer;font-size:1rem;opacity:.7}
  .seg button.on{background:#fff;color:var(--cacao);opacity:1}
  .tbtn{background:rgba(255,255,255,.14);color:#fff;border:none;border-radius:8px;padding:8px 13px;font:inherit;font-size:.88rem;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
  .tbtn:hover{background:rgba(255,255,255,.24)}
  .pub{background:var(--terra);font-weight:700;padding:9px 20px}
  .pub:hover{background:var(--terra2)}
  .pub.dirty{box-shadow:0 0 0 3px rgba(233,179,177,.6)}
  .pub:disabled{opacity:.55;cursor:default;box-shadow:none}
  .menu-wrap{position:relative}
  .menu{position:absolute;right:0;top:42px;background:#fff;color:var(--texte);border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.18);min-width:190px;display:none;overflow:hidden;z-index:60}
  .menu.open{display:block}
  .menu a,.menu button{display:block;width:100%;text-align:left;background:none;border:none;padding:12px 16px;font:inherit;color:var(--texte);cursor:pointer;text-decoration:none}
  .menu a:hover,.menu button:hover{background:var(--coq)}

  /* Astuce d'accueil */
  .tips{background:#fff6f0;color:#7a5d4e;font-size:.85rem;padding:8px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #ecdcd0;flex-shrink:0}
  .tips b{color:var(--cacao)}
  .tips .x{margin-left:auto;background:none;border:none;font-size:1.1rem;color:#b0a094;cursor:pointer}

  /* Barre de mise en forme du texte */
  .fmt{background:#fff;border-bottom:1px solid #e7dcd3;padding:6px 16px;display:none;align-items:center;gap:6px;flex-shrink:0}
  .fmt.show{display:flex}
  .fmt span.lbl{font-size:.8rem;color:#9c8a7e;margin-right:4px}
  .fmt button{background:#f0e7df;border:none;border-radius:7px;width:34px;height:32px;cursor:pointer;font-size:.95rem;color:var(--cacao)}
  .fmt button:hover{background:var(--sable)}

  /* Scène / aperçu */
  .stage{flex:1;position:relative;overflow:auto;background:#ddd0c4;display:flex;justify-content:center}
  .frame-wrap{width:100%;height:100%;transition:width .25s, margin .25s}
  .frame-wrap.phone{width:402px;margin:18px 0;height:calc(100% - 36px);border-radius:26px;box-shadow:0 18px 50px rgba(0,0,0,.25);overflow:hidden;background:#fff;border:8px solid #2c2622}
  iframe{width:100%;height:100%;border:none;background:#fff;display:block}

  /* Panneau thème */
  .panel{position:absolute;top:0;right:0;height:100%;width:310px;background:#fff;box-shadow:-6px 0 30px rgba(0,0,0,.15);transform:translateX(100%);transition:transform .25s;overflow:auto;padding:20px;z-index:50}
  .panel.open{transform:none}
  .panel h3{font-family:'Cormorant Garamond',serif;color:var(--cacao);margin:0 0 6px;font-size:1.5rem}
  .panel .x{position:absolute;right:14px;top:14px;background:none;border:none;font-size:1.4rem;cursor:pointer;color:#aaa}
  .panel label{display:block;font-size:.8rem;font-weight:700;color:var(--cacao);margin:14px 0 5px}
  .panel .row{display:flex;align-items:center;gap:8px}
  .panel input[type=color]{width:44px;height:34px;border:1px solid #ccc;border-radius:6px;padding:0;cursor:pointer}
  .panel input[type=text],.panel select{flex:1;padding:8px;border:1px solid #d9cdc4;border-radius:7px;font:inherit}

  /* Dialogue image */
  .modal{position:fixed;inset:0;background:rgba(40,30,25,.55);display:none;align-items:center;justify-content:center;z-index:80;padding:16px}
  .modal.open{display:flex}
  .modal .box{background:#fff;border-radius:16px;padding:26px;width:100%;max-width:440px}
  .modal h3{font-family:'Cormorant Garamond',serif;color:var(--cacao);margin:0 0 14px;font-size:1.5rem}
  .modal label{display:block;font-size:.82rem;font-weight:700;color:var(--cacao);margin:10px 0 5px}
  .modal input[type=text],.modal input[type=file]{width:100%;padding:11px;border:1px solid #d9cdc4;border-radius:9px;font:inherit}
  .modal .or{text-align:center;color:#b0a094;font-size:.8rem;margin:12px 0}
  .modal .actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
  .modal .ghost{background:#eee;color:#555}

  /* Toast */
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(120px);background:#fff;color:var(--texte);padding:14px 20px;border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.2);display:flex;align-items:center;gap:14px;transition:transform .3s;z-index:90;max-width:92vw}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.ok{border-left:5px solid var(--ok)} .toast.err{border-left:5px solid var(--err)}
  .toast a{color:var(--terra2);font-weight:700;text-decoration:none;white-space:nowrap}

  @media(max-width:640px){
    .toolbar .logo{display:none}
    .tbtn span.t{display:none}
    .frame-wrap.phone{width:100%;border-radius:0;border:none;margin:0;box-shadow:none;height:100%}
  }
</style>
</head>
<body>
  <div class="toolbar">
    <span class="logo">Éditeur</span>
    <select id="pageSel" title="Choisir la page"></select>
    <div class="spacer"></div>
    <div class="seg" title="Aperçu">
      <button id="dDesk" class="on">🖥</button>
      <button id="dPhone">📱</button>
    </div>
    <button class="tbtn" id="themeBtn">🎨 <span class="t">Couleurs &amp; polices</span></button>
    <button class="tbtn pub" id="pubBtn" disabled>Publier</button>
    <div class="menu-wrap">
      <button class="tbtn" id="menuBtn">⋯</button>
      <div class="menu" id="menu">
        <a href="/" target="_blank">↗ Voir le site</a>
        <button id="resetBtn">↩ Annuler mes modifications</button>
        <a href="/cdn-cgi/access/logout">⎋ Se déconnecter</a>
      </div>
    </div>
  </div>

  <div class="tips" id="tips">
    💡 <span><b>Cliquez sur un texte</b> pour le modifier, <b>sur une photo</b> pour la remplacer. Changez les pages en haut à gauche, puis cliquez sur <b>Publier</b>.</span>
    <button class="x" id="tipsX" title="Masquer">×</button>
  </div>

  <div class="fmt" id="fmt">
    <span class="lbl">Mise en forme :</span>
    <button data-cmd="bold" title="Gras"><b>G</b></button>
    <button data-cmd="italic" title="Italique"><i>I</i></button>
    <button data-cmd="createLink" title="Ajouter un lien">🔗</button>
    <button data-cmd="unlink" title="Retirer le lien">⛓️‍💥</button>
    <button data-cmd="removeFormat" title="Effacer la mise en forme">✕</button>
  </div>

  <div class="stage">
    <div class="frame-wrap" id="fw"><iframe id="frame" title="Aperçu du site"></iframe></div>
    <div class="panel" id="panel">
      <button class="x" id="panelClose">×</button>
      <h3>Couleurs &amp; polices</h3>
      <div id="themeFields"></div>
    </div>
  </div>

  <div class="modal" id="imgModal">
    <div class="box">
      <h3>Changer la photo</h3>
      <label>Téléverser une photo depuis l'appareil</label>
      <input type="file" id="imgFile" accept="image/*">
      <div class="or">— ou —</div>
      <label>Coller l'adresse d'une image (lien)</label>
      <input type="text" id="imgUrl" placeholder="https://…">
      <div class="actions">
        <button class="tbtn ghost" id="imgCancel" style="color:#555">Annuler</button>
        <button class="tbtn pub" id="imgOk">Valider</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
const PAGES=[
  {file:"index.html",label:"Accueil"},
  {file:"accompagnements.html",label:"Mes accompagnements"},
  {file:"seances.html",label:"Déroulement des séances"},
  {file:"contact.html",label:"Contact & Tarifs"},
  {file:"temoignages.html",label:"Témoignages"},
  {file:"faq.html",label:"FAQ"},
];
const THEME_FIELDS=[
  {k:"couleur_terracotta",label:"Terracotta (boutons, accents)"},
  {k:"couleur_cacao",label:"Cacao (titres, pied de page)"},
  {k:"couleur_coquillage",label:"Fond clair"},
  {k:"couleur_sable",label:"Sable"},
  {k:"couleur_beige_rose",label:"Beige rosé"},
  {k:"couleur_flamant",label:"Rose flamant"},
  {k:"couleur_ocean",label:"Bleu océan"},
  {k:"couleur_sauge",label:"Vert sauge"},
];
const FONTS_TITRE=["Cormorant Garamond","Playfair Display","Lora","EB Garamond"];
const FONTS_TEXTE=["Lato","Open Sans","Nunito Sans","Source Sans 3"];
const CSSVAR={couleur_terracotta:"--terracotta",couleur_sable:"--sable",couleur_beige_rose:"--beige-rose",couleur_coquillage:"--coquillage",couleur_cacao:"--cacao",couleur_flamant:"--flamant",couleur_ocean:"--ocean",couleur_sauge:"--sauge"};

let CONTENT={},THEME={},current=0,dirty=false,activeEl=null,imgTarget=null;
const pendingImages=[];
const $=id=>document.getElementById(id);

function setDirty(v){ dirty=v; const b=$("pubBtn"); b.disabled=!v; b.textContent=v?"Publier les modifications":"Publier"; b.classList.toggle("dirty",v); }
function toast(msg,type,linkHtml){ const t=$("toast"); t.className="toast show "+(type||""); t.innerHTML="<span>"+msg+"</span>"+(linkHtml||""); clearTimeout(t._t); t._t=setTimeout(()=>t.className="toast "+(type||""),7000); }

async function boot(){
  const b="?v="+Date.now();
  try{CONTENT=await (await fetch("/content.json"+b)).json();}catch(e){CONTENT={};}
  try{THEME=await (await fetch("/theme.json"+b)).json();}catch(e){THEME={};}
  $("pageSel").innerHTML=PAGES.map((p,i)=>`<option value="${i}">${p.label}</option>`).join("");
  buildTheme();
  if(localStorage.getItem("tipsHidden")==="1") $("tips").style.display="none";
  loadPage(0);
}

$("pageSel").addEventListener("change",e=>{ current=+e.target.value; loadPage(current); });
$("dDesk").addEventListener("click",()=>setDevice(false));
$("dPhone").addEventListener("click",()=>setDevice(true));
function setDevice(phone){ $("fw").classList.toggle("phone",phone); $("dPhone").classList.toggle("on",phone); $("dDesk").classList.toggle("on",!phone); }

function loadPage(i){
  const f=$("frame"); hideFmt();
  f.onload=()=>{ try{decorate(f.contentDocument);}catch(e){console.error(e);} };
  f.src="/"+PAGES[i].file+"?edit=1";
}

function assombrir(hex,a){try{const c=hex.replace("#","");const r=Math.max(0,Math.round(parseInt(c.substr(0,2),16)*(1-a)));const g=Math.max(0,Math.round(parseInt(c.substr(2,2),16)*(1-a)));const b=Math.max(0,Math.round(parseInt(c.substr(4,2),16)*(1-a)));return"#"+[r,g,b].map(x=>x.toString(16).padStart(2,"0")).join("")}catch(e){return hex}}
function applyTheme(doc){
  const rs=doc.documentElement.style;
  Object.keys(CSSVAR).forEach(k=>{if(THEME[k])rs.setProperty(CSSVAR[k],THEME[k]);});
  if(THEME.couleur_terracotta)rs.setProperty("--terracotta-fonce",assombrir(THEME.couleur_terracotta,.12));
  const t=THEME.police_titres,x=THEME.police_textes;
  if(t||x){const fam=[];if(t)fam.push(t.replace(/ /g,"+")+":ital,wght@0,400;0,500;0,600;1,500");if(x&&x!==t)fam.push(x.replace(/ /g,"+")+":wght@300;400;700");let l=doc.getElementById("police-dyn");if(!l){l=doc.createElement("link");l.id="police-dyn";l.rel="stylesheet";doc.head.appendChild(l);}l.href="https://fonts.googleapis.com/css2?family="+fam.join("&family=")+"&display=swap";if(t)rs.setProperty("--titre","'"+t+"', Georgia, serif");if(x)rs.setProperty("--corps","'"+x+"', -apple-system, sans-serif");}
}
function applyContent(doc){
  doc.querySelectorAll("[data-edit]").forEach(el=>{const v=CONTENT[el.getAttribute("data-edit")];if(typeof v==="string"&&v.length)el.innerHTML=v;});
  doc.querySelectorAll("[data-edit-bg]").forEach(el=>{const v=CONTENT[el.getAttribute("data-edit-bg")];if(typeof v==="string"&&v.length)el.style.backgroundImage="url('"+v+"')";});
  doc.querySelectorAll("[data-edit-src]").forEach(el=>{const v=CONTENT[el.getAttribute("data-edit-src")];if(typeof v==="string"&&v.length)el.setAttribute("src",v);});
  doc.querySelectorAll("[data-edit-href]").forEach(el=>{const v=CONTENT[el.getAttribute("data-edit-href")];if(typeof v==="string"&&v.length)el.setAttribute("href",v);});
}
function decorate(doc){
  applyTheme(doc); applyContent(doc);
  const st=doc.createElement("style");
  st.textContent=`[data-edit]{outline:1.5px dashed rgba(201,122,97,.55);outline-offset:3px;cursor:text;transition:background .15s,outline-color .15s;border-radius:2px}
  [data-edit]:hover{background:rgba(201,122,97,.14);outline-color:var(--terracotta,#C97A61)}
  [data-edit]:focus{outline:2px solid #C97A61;background:rgba(201,122,97,.08)}
  [data-edit-bg],[data-edit-src]{cursor:pointer;position:relative}
  [data-edit-bg]:hover,[data-edit-src]:hover{outline:3px solid #C97A61;outline-offset:-3px}
  .kairos-photo-badge{position:absolute;top:10px;left:10px;background:rgba(107,79,67,.9);color:#fff;padding:6px 12px;border-radius:50px;font:600 13px Lato,sans-serif;pointer-events:none;z-index:5}`;
  doc.head.appendChild(st);

  // bloquer la navigation pendant l'édition
  doc.addEventListener("click",e=>{const a=e.target.closest("a,button");if(a&&!a.closest("[data-edit-bg]")&&!a.closest("[data-edit-src]")){e.preventDefault();e.stopPropagation();}},true);

  // textes éditables
  doc.querySelectorAll("[data-edit]").forEach(el=>{
    el.setAttribute("contenteditable","true");
    el.addEventListener("focus",()=>{activeEl=el;showFmt();});
    el.addEventListener("blur",()=>{ setTimeout(()=>{ if(doc.activeElement&&doc.activeElement.hasAttribute&&doc.activeElement.hasAttribute("data-edit"))return; hideFmt(); },150); });
    el.addEventListener("input",()=>{CONTENT[el.getAttribute("data-edit")]=el.innerHTML.trim();setDirty(true);});
    el.addEventListener("paste",e=>{e.preventDefault();const txt=(e.clipboardData||window.clipboardData).getData("text");doc.execCommand("insertText",false,txt);});
  });
  // images éditables : badge au survol + clic
  doc.querySelectorAll("[data-edit-bg],[data-edit-src]").forEach(el=>{
    el.addEventListener("mouseenter",()=>{ if(el.querySelector(".kairos-photo-badge"))return; const b=doc.createElement("span");b.className="kairos-photo-badge";b.textContent="📷 Changer la photo";el.appendChild(b); });
    el.addEventListener("mouseleave",()=>{const b=el.querySelector(".kairos-photo-badge");if(b)b.remove();});
    el.addEventListener("click",e=>{e.preventDefault();e.stopPropagation();const kind=el.hasAttribute("data-edit-bg")?"bg":"src";openImg(el,kind);},true);
  });
}

/* Barre de mise en forme */
function showFmt(){ $("fmt").classList.add("show"); }
function hideFmt(){ $("fmt").classList.remove("show"); }
$("fmt").querySelectorAll("button").forEach(btn=>{
  btn.addEventListener("mousedown",e=>e.preventDefault()); // garder le focus dans l'iframe
  btn.addEventListener("click",()=>{
    const doc=$("frame").contentDocument, cmd=btn.dataset.cmd;
    if(cmd==="createLink"){ const url=prompt("Adresse du lien (https://…) :"); if(!url)return; doc.execCommand("createLink",false,url); }
    else doc.execCommand(cmd,false,null);
    if(activeEl){ CONTENT[activeEl.getAttribute("data-edit")]=activeEl.innerHTML.trim(); setDirty(true); }
  });
});

/* Thème */
function buildTheme(){
  let h=THEME_FIELDS.map(f=>`<label>${f.label}</label><div class="row"><input type="color" data-tk="${f.k}" value="${THEME[f.k]||'#000000'}"><input type="text" data-tk="${f.k}__hex" value="${THEME[f.k]||''}"></div>`).join("");
  h+=`<label>Police des titres</label><select data-tk="police_titres">${FONTS_TITRE.map(o=>`<option ${o===THEME.police_titres?'selected':''}>${o}</option>`).join("")}</select>`;
  h+=`<label>Police des textes</label><select data-tk="police_textes">${FONTS_TEXTE.map(o=>`<option ${o===THEME.police_textes?'selected':''}>${o}</option>`).join("")}</select>`;
  $("themeFields").innerHTML=h;
  $("themeFields").querySelectorAll("[data-tk]").forEach(inp=>inp.addEventListener("input",()=>{
    const k=inp.dataset.tk;
    if(k.endsWith("__hex")){const base=k.replace("__hex","");if(/^#[0-9a-fA-F]{6}$/.test(inp.value)){THEME[base]=inp.value;const ci=document.querySelector(`[data-tk="${base}"]`);if(ci)ci.value=inp.value;}}
    else{THEME[k]=inp.value;const hx=document.querySelector(`[data-tk="${k}__hex"]`);if(hx)hx.value=inp.value;}
    try{applyTheme($("frame").contentDocument);}catch(e){}
    setDirty(true);
  }));
}
$("themeBtn").addEventListener("click",()=>$("panel").classList.toggle("open"));
$("panelClose").addEventListener("click",()=>$("panel").classList.remove("open"));

/* Menu */
$("menuBtn").addEventListener("click",e=>{e.stopPropagation();$("menu").classList.toggle("open");});
document.addEventListener("click",()=>$("menu").classList.remove("open"));
$("menu").addEventListener("click",e=>e.stopPropagation());
$("resetBtn").addEventListener("click",()=>{ if(confirm("Annuler toutes les modifications non publiées et recharger la dernière version en ligne ?")){ pendingImages.length=0; boot().then(()=>{setDirty(false);}); } });
$("tipsX").addEventListener("click",()=>{$("tips").style.display="none";localStorage.setItem("tipsHidden","1");});

/* Image */
function openImg(el,kind){ imgTarget={el,kind,key:el.getAttribute(kind==="bg"?"data-edit-bg":"data-edit-src")}; const cur=kind==="bg"?(el.style.backgroundImage||"").replace(/^url\(['"]?/,"").replace(/['"]?\)$/,""):el.getAttribute("src"); $("imgUrl").value=(cur&&cur.indexOf("data:")!==0)?cur:""; $("imgFile").value=""; $("imgModal").classList.add("open"); }
$("imgCancel").addEventListener("click",()=>$("imgModal").classList.remove("open"));
$("imgOk").addEventListener("click",()=>{
  if(!imgTarget)return;
  const apply=val=>{CONTENT[imgTarget.key]=val;if(imgTarget.kind==="bg")imgTarget.el.style.backgroundImage="url('"+val+"')";else imgTarget.el.setAttribute("src",val);setDirty(true);$("imgModal").classList.remove("open");};
  const file=$("imgFile").files[0];
  if(file){const r=new FileReader();r.onload=()=>{const b64=String(r.result).split(",")[1];const safe=Date.now()+"_"+file.name.replace(/[^a-zA-Z0-9._-]/g,"_");pendingImages.push({name:safe,data:b64});apply("/images/"+safe);};r.readAsDataURL(file);}
  else if($("imgUrl").value.trim())apply($("imgUrl").value.trim());
  else $("imgModal").classList.remove("open");
});

/* Publier */
async function publish(){
  if(!dirty)return;
  const b=$("pubBtn");b.disabled=true;b.textContent="Publication…";
  try{
    const r=await fetch("/admin/api/publish",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({content:CONTENT,theme:THEME,images:pendingImages.map(i=>({name:i.name,data:i.data}))})});
    const j=await r.json();
    if(j.ok){pendingImages.length=0;setDirty(false);toast("✓ Publié ! Votre site se met à jour (1 à 2 min).","ok",' <a href="/" target="_blank">Voir le site</a>');}
    else{toast("Erreur : "+(j.error||"inconnue"),"err");setDirty(true);}
  }catch(e){toast("Erreur réseau : "+e.message,"err");setDirty(true);}
}
$("pubBtn").addEventListener("click",publish);
document.addEventListener("keydown",e=>{ if((e.metaKey||e.ctrlKey)&&e.key==="s"){e.preventDefault();publish();} });
window.addEventListener("beforeunload",e=>{ if(dirty){e.preventDefault();e.returnValue="";} });

boot();
</script>
</body>
</html>
